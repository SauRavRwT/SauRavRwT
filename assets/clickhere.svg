<svg fill="none" viewBox="0 0 800 100" width="800" height="100" xmlns="http://www.w3.org/2002C3E/svg">
	<foreignObject width="100%" height="100%">
		<div xmlns="http://www.w3.org/1999/xhtml">
			<style>
				@keyframes gradientText {
				  0% {
				    background-position: 0% 50%;
				  }
				  50% {
				    background-position: 100% 50%;
				  }
				  100% {
				    background-position: 0% 50%;
				  }
				}
				h1 {
				  font-family: monospace;
				  margin: 0;
				  font-size: 4em;
				  font-weight: 900;
				  letter-spacing: -.04em;
				  text-align: center;
				  background: -webkit-linear-gradient(right,#78BCC4,#002C3E);
				  background: linear-gradient(270deg,#78BCC4 0,#002C3E);
				  background-size: 200%;
				  background-clip: text;
				  -webkit-background-clip: text;
				  -webkit-text-fill-color: transparent;
				  -webkit-animation: gradientText 3s ease infinite;
				  animation: gradientText 3s ease infinite;
				}
			</style>
			<h1>Click here</h1>
		</div>
	</foreignObject>
</svg>